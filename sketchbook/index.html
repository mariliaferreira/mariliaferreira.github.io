const TYPE_LABELS = { single:'Single Page', spread:'Double Spread', accordion:'Accordion' };

// ── RESPONSIVE HOOK ───────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

function getCardConfig(numCols) {
  if (numCols <= 2) return {
    single:    { cols:1, thumbH:165, svgMaxW:155, svgMaxH:145 },
    spread:    { cols:2, thumbH:130, svgMaxW:334, svgMaxH:110 },
    accordion: { cols:2, thumbH:108, svgMaxW:334, svgMaxH: 90 },
  };
  return {
    single:    { cols:1, thumbH:210, svgMaxW:255, svgMaxH:190 },
    spread:    { cols:2, thumbH:168, svgMaxW:530, svgMaxH:148 },
    accordion: { cols:2, thumbH:138, svgMaxW:530, svgMaxH:118 },
  };
}

// ── SVG ──────────────────────────────────────────────────────────
function getVB(layout, fmt) {
  if (layout.type==='single')    return [fmt.w, fmt.h];
  if (layout.type==='spread')    return [fmt.w*2, fmt.h];
  return [fmt.w*3, fmt.h];
}

function LayoutSVG({ layout, format, maxWidth=9999, maxHeight=9999 }) {
  const [vw,vh] = getVB(layout, format);
  const scale = Math.min(maxWidth/vw, maxHeight/vh);
  const dispW = Math.round(vw*scale);
  const dispH = Math.round(vh*scale);
  const pid = `h-${layout.id}-${format.id}`;
  return (
    <svg width={dispW} height={dispH} viewBox={`0 0 ${vw} ${vh}`} style={{display:'block',flexShrink:0}}>
      <defs>
        <pattern id={pid} x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="#C0BAB2" strokeWidth="0.8"/>
        </pattern>
      </defs>
      <rect width={vw} height={vh} fill="#F5F1EC"/>
      {layout.type==='spread'    && <line x1={vw/2} y1={0} x2={vw/2} y2={vh} stroke="#DDD8D2" strokeWidth="0.6" strokeDasharray="2 2"/>}
      {layout.type==='accordion' && [1,2].map(i=><line key={i} x1={vw/3*i} y1={0} x2={vw/3*i} y2={vh} stroke="#DDD8D2" strokeWidth="0.6" strokeDasharray="2 2"/>)}
      {layout.zones.map((z,i)=>{
        const x=z.xp*vw, y=z.yp*vh, w=z.wp*vw, h=z.hp*vh;
        if(z.r==='text'){
          const n=Math.max(2,Math.floor(h/(vh*0.04))), lh=h/n;
          return <g key={i}>{Array.from({length:n},(_,li)=>{
            const lw=li%3===2?w*.55:li%2===0?w*.92:w*.76;
            return <line key={li} x1={x} y1={y+lh*li+lh*.5} x2={x+lw} y2={y+lh*li+lh*.5} stroke="#C4BEB6" strokeWidth="0.6"/>;
          })}</g>;
        }
        if(z.r==='title')  return <rect key={i} x={x} y={y} width={w} height={h} fill="#2A2520"/>;
        if(z.r==='image')  return <g key={i}><rect x={x} y={y} width={w} height={h} fill={`url(#${pid})`}/><rect x={x} y={y} width={w} height={h} fill="none" stroke="#A09890" strokeWidth="0.7"/></g>;
        if(z.r==='accent') return <rect key={i} x={x} y={y} width={w} height={h} fill="#D4CFC8" stroke="#A09890" strokeWidth="0.5"/>;
        return null;
      })}
      <rect x="0.4" y="0.4" width={vw-0.8} height={vh-0.8} fill="none" stroke="#CCCAB4" strokeWidth="0.7"/>
    </svg>
  );
}

// ── FORMAT SHAPE ─────────────────────────────────────────────────
function FormatShape({ fmt, size=56 }) {
  const aspect = fmt.w/fmt.h;
  const sw = aspect>=1 ? size : Math.round(size*aspect);
  const sh = aspect>=1 ? Math.round(size/aspect) : size;
  return (
    <svg width={sw} height={sh} viewBox={`0 0 ${sw} ${sh}`} style={{display:'block'}}>
      <defs>
        <pattern id={`fp-${fmt.id}-${size}`} x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="4" stroke="#C4BEB6" strokeWidth="0.5"/>
        </pattern>
      </defs>
      <rect width={sw} height={sh} fill={`url(#fp-${fmt.id}-${size})`}/>
      <rect x="0.5" y="0.5" width={sw-1} height={sh-1} fill="none" stroke="#A09890" strokeWidth="1"/>
    </svg>
  );
}

  return (
    <div style={{maxWidth:640,margin:'0 auto',paddingTop:40}}>
      <div style={{marginBottom:32}}>
        {onBack && (
          <button onClick={onBack} style={{background:'none',border:'none',display:'flex',alignItems:'center',gap:4,color:'#7A7470',fontSize:13,padding:0,marginBottom:24}}>
            <BackArrow/> Back
          </button>

        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:500,color:'#2A2520',lineHeight:1}}>Your</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontStyle:'italic',color:'#8C8680',lineHeight:1.2}}>Sketchbook</div>
        <div style={{marginTop:12,fontSize:14,color:'#7A7470',lineHeight:1.6,fontWeight:300}}>Choose your format. Layout diagrams adapt to your page proportions.</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))',gap:12}}>
        {FORMATS.map(fmt=>{
          const active=chosen===fmt.id;
          return (
            <button key={fmt.id} onClick={()=>confirm(fmt)} style={{background:active?'#2A2520':'#FEFCF9',border:`1.5px solid ${active?'#2A2520':'#E4DFD8'}`,borderRadius:14,padding:'20px 16px 18px',display:'flex',flexDirection:'column',alignItems:'center',gap:12,cursor:'pointer',transition:'all 0.18s'}}>

              <div style={{fontSize:13.5,fontWeight:500,color:active?'#F5F1EC':'#2A2520',lineHeight:1.2}}>{fmt.name}</div>
              <div style={{fontSize:11.5,color:active?'#C8C4BC':'#B0ACA4',textAlign:'center',lineHeight:1.5,fontWeight:300}}>{fmt.desc}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── MODE BADGE ───────────────────────────────────────────────────
function ModeBadge({ mode, compact=false }) {
  if (!mode) return null;
  const s = MODE_STYLE[mode];
  return (
    <span style={{fontSize:compact?9:10,padding:compact?'2px 6px':'3px 8px',borderRadius:20,background:s.bg,color:s.color,fontWeight:400,letterSpacing:'0.01em',whiteSpace:'nowrap',display:'inline-block'}}>
      {mode}
    </span>

}

// ── LAYOUT CARD ──────────────────────────────────────────────────
function LayoutCard({ layout, format, isFaved, onFave, onSelect, cardConfig }) {
  const [pressed,setPressed] = useState(false);
  const cfg = cardConfig[layout.type];
  return (
    <div
      onClick={onSelect}
      onPointerDown={()=>setPressed(true)} onPointerUp={()=>setPressed(false)} onPointerLeave={()=>setPressed(false)}
      style={{gridColumn:`span ${cfg.cols}`,background:'#FEFCF9',borderRadius:14,overflow:'hidden',border:'1px solid #E8E3DC',transform:pressed?'scale(0.98)':'scale(1)',transition:'transform 0.12s',cursor:'pointer'}}
    >
      <div style={{position:'relative',background:'#EDEAE3',height:cfg.thumbH,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
        <LayoutSVG layout={layout} format={format} maxWidth={cfg.svgMaxW} maxHeight={cfg.svgMaxH}/>
        <button onClick={e=>{e.stopPropagation();onFave();}} style={{position:'absolute',top:8,right:8,width:30,height:30,borderRadius:'50%',background:'rgba(247,244,239,0.88)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:isFaved?'#7A5C3A':'#A09890',transition:'color 0.15s'}}>
          <HeartSmIcon filled={isFaved}/>
        </button>
        <div style={{position:'absolute',bottom:8,left:8,display:'flex',gap:4,alignItems:'center'}}>

            {TYPE_SHORT[layout.type]}

          {layout.free && (
            <div style={{background:'rgba(220,252,231,0.92)',borderRadius:10,padding:'2px 7px',fontSize:9.5,letterSpacing:'0.06em',textTransform:'uppercase',color:'#166534',fontWeight:500}}>
              Free

      </div>
      <div style={{padding:'10px 14px 8px',display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:8}}>
        <div style={{fontSize:14,fontWeight:500,color:'#2A2520',lineHeight:1.2,fontFamily:"'Cormorant Garamond',serif"}}>{layout.name}</div>

// ── HOME SCREEN ──────────────────────────────────────────────────
function HomeScreen({ format, layouts, favorites, onToggleFave, onSelect, filter, setFilter, modeFilter, setModeFilter, cardConfig, numCols }) {
  const typeFilters = ['all','single','spread','accordion'];
  const filtered = layouts.filter(l => {
    const typeMatch = filter === 'all' || l.type === filter;
    const modeMatch = modeFilter === 'all' || l.mode === modeFilter;
    return typeMatch && modeMatch;
  });

  const typeBtn = (val, label) => {
    const active = filter === val;
    return (
      <button key={val} onClick={()=>setFilter(val)} style={{padding:'7px 18px',borderRadius:20,border:'1px solid',transition:'all 0.15s',borderColor:active?'#2A2520':'#DDD8D2',background:active?'#2A2520':'transparent',color:active?'#F5F1EC':'#7A7470',fontSize:11.5,letterSpacing:'0.04em',textTransform:'uppercase',whiteSpace:'nowrap'}}>
        {label}
      </button>
    );
  };

  const modeBtn = (val) => {
    const active = modeFilter === val;
    const s = val !== 'all' ? MODE_STYLE[val] : null;
    const label = val === 'all' ? 'All modes' : val;
    return (
      <button key={val} onClick={()=>setModeFilter(val)} style={{padding:'5px 14px',borderRadius:20,border:`1px solid ${active?(s?s.color:'#2A2520'):'#DDD8D2'}`,transition:'all 0.15s',background:active?(s?s.bg:'#2A2520'):'transparent',color:active?(s?s.color:'#F5F1EC'):'#7A7470',fontSize:11,letterSpacing:'0.02em',whiteSpace:'nowrap'}}>
        {label}
      </button>
    );
  };

  return (
    <div style={{paddingTop:40}}>
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:500,color:'#2A2520',letterSpacing:'-0.01em',lineHeight:1}}>Sketchbook</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontStyle:'italic',color:'#8C8680',lineHeight:1.1}}>Layouts</div>
        <div style={{marginTop:8,fontSize:12,color:'#A09890',letterSpacing:'0.05em',textTransform:'uppercase'}}>{filtered.length} layout{filtered.length!==1?'s':''}</div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        {typeFilters.map(f => typeBtn(f, f==='all'?'All':TYPE_LABELS[f]))}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:28,flexWrap:'wrap'}}>
        {MODE_FILTERS.map(m => modeBtn(m))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:`repeat(${numCols}, 1fr)`,gap:12}}>
        {filtered.map(layout=>(
          <LayoutCard key={layout.id} layout={layout} format={format}
            isFaved={favorites.includes(layout.id)}
            onFave={()=>onToggleFave(layout.id)}
            onSelect={()=>onSelect(layout)}
            cardConfig={cardConfig}/>
        ))}
      </div>

      {filtered.length === 0 && (
        <div style={{paddingTop:80,textAlign:'center'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontStyle:'italic',color:'#B4AEA8',lineHeight:1.6}}>No layouts match this combination.<br/>Try adjusting the filters.</div>
        </div>
      )}
    </div>
  );
}

  const diagram = (
    <div>
      <div style={{background:'#EDEAE3',borderRadius:16,padding:'24px 20px',display:'flex',justifyContent:'center',alignItems:'center',overflow:'hidden',border:'1px solid #E4DFD8'}}>
        <LayoutSVG layout={layout} format={format} maxWidth={isDesktop?480:520} maxHeight={isDesktop?360:260}/>
      </div>
      <div style={{marginTop:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <FormatShape fmt={format} size={15}/>
          <span style={{fontSize:10.5,letterSpacing:'0.08em',textTransform:'uppercase',color:'#A09890'}}>{format.name} · {TYPE_LABELS[layout.type]}</span>
        </div>
        <button onClick={onToggleFave} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 16px',borderRadius:20,border:'1px solid',borderColor:isFaved?'#7A5C3A':'#DDD8D2',background:isFaved?'#7A5C3A':'transparent',color:isFaved?'#F5F1EC':'#7A7470',fontSize:11,letterSpacing:'0.05em',textTransform:'uppercase',transition:'all 0.15s'}}>
          <HeartSmIcon filled={isFaved}/> {isFaved?'Saved':'Save'}
        </button>
      </div>
    </div>
  );

  const details = (
    <div>
      {!isDesktop && <>{diagram}{divider}</>}

      {layout.tryWhen && (
        <div style={{marginBottom:24}}>
          <div style={lbl}>Try this when</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:isDesktop?17:15,color:'#5A5450',lineHeight:1.7}}>{layout.tryWhen}</div>
        </div>
      )}

      {layout.mode && (
        <div style={{marginBottom:24}}>
          <div style={lbl}>Mode</div>
          <ModeBadge mode={layout.mode}/>
        </div>
      )}

      {divider}

      <div>
        <div style={lbl}>Composition Principles</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {layout.principles.map((p,i)=>(
            <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <span style={{fontSize:10,color:'#B4AEA8',fontFamily:'monospace',marginTop:4,flexShrink:0}}>{String(i+1).padStart(2,'0')}</span>
              <span style={body}>{p}</span>
            </div>
          ))}
        </div>
      </div>
      {divider}
      <div>
        <div style={lbl}>Lettering Style</div>
        <TypoPreview preview={layout.typography.preview}/>
        <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>
          {[['Style',layout.typography.style],['Placement',layout.typography.placement],['Pairing',layout.typography.pairing]].map(([k,v])=>(
            <div key={k} style={{fontSize:13,color:'#5A5450',lineHeight:1.6}}>
              <span style={{color:'#2A2520',fontWeight:500}}>{k}</span> — {v}
            </div>
          ))}
        </div>
      </div>
      {divider}
      <div>
        <div style={lbl}>Sketching Tips</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {layout.tips.map((t,i)=>(
            <div key={i} style={{...body,display:'flex',gap:12,alignItems:'flex-start'}}>
              <span style={{width:4,height:4,borderRadius:'50%',background:'#C4BEB6',flexShrink:0,marginTop:9}}/>
              {t}
            </div>
          ))}
        </div>
      </div>

      {layout.extras && layout.extras.length > 0 && (
        <>
          {divider}
          <div>
            <div style={lbl}>Extras to consider</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {layout.extras.map((e,i)=>(
                <span key={i} style={{fontSize:12,padding:'4px 12px',borderRadius:20,background:'#F0EDE8',color:'#5A5450',border:'1px solid #E4DFD8'}}>
                  {e}
                </span>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );

  return (
    <div style={{paddingTop:36,paddingBottom:60}}>
      <button onClick={onBack} style={{background:'none',border:'none',display:'flex',alignItems:'center',gap:4,color:'#7A7470',fontSize:13,padding:0,marginBottom:28}}>
        <BackArrow/> Back
      </button>
      <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:4,flexWrap:'wrap'}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isDesktop?46:36,fontWeight:500,color:'#2A2520',letterSpacing:'-0.01em',lineHeight:1}}>{layout.name}</div>
        {layout.free && <span style={{fontSize:10,padding:'3px 9px',borderRadius:20,background:'#DCFCE7',color:'#166534',fontWeight:500,letterSpacing:'0.04em',textTransform:'uppercase',marginTop:isDesktop?12:8,flexShrink:0}}>Free</span>}
      </div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isDesktop?24:18,fontStyle:'italic',color:'#8C8680',marginBottom:isDesktop?36:24}}>{layout.subtitle}</div>
      {isDesktop ? (
        <div style={{display:'flex',gap:48,alignItems:'flex-start'}}>
          <div style={{width:'42%',flexShrink:0,position:'sticky',top:80}}>{diagram}</div>
          <div style={{flex:1}}>{details}</div>
        </div>
      ) : details}
    </div>
  );
}

// ── FAVORITES SCREEN ─────────────────────────────────────────────
function FavoritesScreen({ format, layouts, favorites, onSelect, onToggleFave, cardConfig, numCols }) {
  const faved = layouts.filter(l=>favorites.includes(l.id));
  return (
    <div style={{paddingTop:40}}>
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:500,color:'#2A2520',lineHeight:1}}>Saved</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontStyle:'italic',color:'#8C8680',lineHeight:1.1}}>Layouts</div>
        <div style={{marginTop:8,fontSize:12,color:'#A09890',letterSpacing:'0.05em',textTransform:'uppercase'}}>{faved.length} saved</div>
      </div>
      {faved.length===0 ? (
        <div style={{paddingTop:80,textAlign:'center'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontStyle:'italic',color:'#B4AEA8',lineHeight:1.6}}>Click the heart on any layout<br/>to save it here</div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:`repeat(${numCols}, 1fr)`,gap:12}}>
          {faved.map(layout=>(
            <LayoutCard key={layout.id} layout={layout} format={format} isFaved={true}
              onFave={()=>onToggleFave(layout.id)} onSelect={()=>onSelect(layout)}
              cardConfig={cardConfig}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────
function App() {
  const windowWidth  = useWindowWidth();
  const isDesktop    = windowWidth >= 768;
  const numCols      = windowWidth < 640 ? 2 : 4;
  const cardConfig   = getCardConfig(numCols);

  const savedFmtId = localStorage.getItem('sc_fmt');
  const initFmt = FORMATS.find(f=>f.id===savedFmtId)||null;
  const [format,setFormat]         = useState(initFmt);
  const [pickingFormat,setPicking] = useState(!initFmt);
  const [navTab,setNavTab]         = useState('browse');
  const [selected,setSelected]     = useState(null);
  const [filter,setFilter]         = useState('all');
  const [modeFilter,setModeFilter] = useState('all');
  const [favorites,setFavorites]   = useState(()=>{ try{return JSON.parse(localStorage.getItem('sc_faves')||'[]');}catch{return [];} });

  const selectFmt  = fmt=>{ setFormat(fmt); localStorage.setItem('sc_fmt',fmt.id); setPicking(false); };
  const toggleFave = id=>{ const n=favorites.includes(id)?favorites.filter(f=>f!==id):[...favorites,id]; setFavorites(n); localStorage.setItem('sc_faves',JSON.stringify(n)); };

  const showTabs   = !pickingFormat && !selected;
  const showFormat = !pickingFormat && !selected && !!format;

  return (
    <>
      <TopNav navTab={navTab} setNavTab={setNavTab} showTabs={showTabs} showFormat={showFormat} format={format} onChangeFormat={()=>setPicking(true)}/>
      <div className="page">
        {pickingFormat ? (
          <FormatPicker onSelect={selectFmt} current={format?.id} onBack={format?()=>setPicking(false):null}/>
        ) : selected ? (
          <DetailScreen layout={selected} format={format} isFaved={favorites.includes(selected.id)} onToggleFave={()=>toggleFave(selected.id)} onBack={()=>setSelected(null)} isDesktop={isDesktop}/>
        ) : navTab==='browse' ? (
          <HomeScreen format={format} layouts={LAYOUTS} favorites={favorites} onToggleFave={toggleFave} onSelect={setSelected} filter={filter} setFilter={setFilter} modeFilter={modeFilter} setModeFilter={setModeFilter} cardConfig={cardConfig} numCols={numCols}/>
        ) : (
          <FavoritesScreen format={format} layouts={LAYOUTS} favorites={favorites} onSelect={setSelected} onToggleFave={toggleFave} cardConfig={cardConfig} numCols={numCols}/>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
