// ── RESPONSIVE HOOK ───────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

function getCardConfig(numCols) {
  if (numCols <= 2) return {
    single:    { cols:1, thumbH:165, svgMaxW:155, svgMaxH:145 },
    spread:    { cols:2, thumbH:130, svgMaxW:334, svgMaxH:110 },
    accordion: { cols:2, thumbH:108, svgMaxW:334, svgMaxH: 90 },
    pocket:    { cols:1, thumbH:165, svgMaxW:155, svgMaxH:145 },
  };
  return {
    single:    { cols:1, thumbH:210, svgMaxW:255, svgMaxH:190 },

}

// ── SVG ──────────────────────────────────────────────────────────
function getVB(layout, fmt) {
  if (layout.type==='single')    return [fmt.w, fmt.h];
  if (layout.type==='spread')    return [fmt.w*2, fmt.h];
  if (layout.type==='pocket')    return [fmt.w, fmt.h];
  return [fmt.w*3, fmt.h];
}

function LayoutSVG({ layout, format, maxWidth=9999, maxHeight=9999 }) {
  const [vw,vh] = getVB(layout, format);
  const scale = Math.min(maxWidth/vw, maxHeight/vh);
  const dispW = Math.round(vw*scale);
  const dispH = Math.round(vh*scale);
  const pid = `h-${layout.id}-${format.id}`;
  return (
    <svg width={dispW} height={dispH} viewBox={`0 0 ${vw} ${vh}`} style={{display:'block',flexShrink:0}}>
      <defs>
        <pattern id={pid} x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="5" stroke="#C0BAB2" strokeWidth="0.8"/>
        </pattern>
      </defs>
      <rect width={vw} height={vh} fill={layout.darkBg ? '#2A2520' : '#F5F1EC'}/>
      {layout.type==='spread'    && <line x1={vw/2} y1={0} x2={vw/2} y2={vh} stroke="#DDD8D2" strokeWidth="0.6" strokeDasharray="2 2"/>}
      {layout.type==='accordion' && [1,2].map(i=><line key={i} x1={vw/3*i} y1={0} x2={vw/3*i} y2={vh} stroke="#DDD8D2" strokeWidth="0.6" strokeDasharray="2 2"/>)}
      {layout.zones.map((z,i)=>{
        const x=z.xp*vw, y=z.yp*vh, w=z.wp*vw, h=z.hp*vh;
        if(z.r==='text'){
          const n=Math.max(2,Math.floor(h/(vh*0.04))), lh=h/n;
          return <g key={i}>{Array.from({length:n},(_,li)=>{
            const lw=li%3===2?w*.55:li%2===0?w*.92:w*.76;
            return <line key={li} x1={x} y1={y+lh*li+lh*.5} x2={x+lw} y2={y+lh*li+lh*.5} stroke="#C4BEB6" strokeWidth="0.6"/>;
          })}</g>;
        }
        if(z.r==='title')  return <rect key={i} x={x} y={y} width={w} height={h} fill="#2A2520"/>;
        if(z.r==='image')  return <g key={i}><rect x={x} y={y} width={w} height={h} fill={`url(#${pid})`}/><rect x={x} y={y} width={w} height={h} fill="none" stroke="#A09890" strokeWidth="0.7"/></g>;
        if(z.r==='accent') return <rect key={i} x={x} y={y} width={w} height={h} fill="#D4CFC8" stroke="#A09890" strokeWidth="0.5"/>;
        if(z.r==='light')  return <rect key={i} x={x} y={y} width={w} height={h} fill="#EDEAE3" stroke="#C4BEB6" strokeWidth="0.5"/>;
        if(z.r==='item'){
          const cx=x+w/2, cy=y+h/2, rot=z.rot||0;
          return <g key={i} transform={`rotate(${rot},${cx},${cy})`}>
            <rect x={x} y={y} width={w} height={h} fill="#EAE6E0" stroke="#A09890" strokeWidth="0.7"/>
          </g>;
        }
        if(z.r==='fold'){
          const fy=z.yp*vh;
          return <g key={i}>
            <rect x={0} y={fy} width={vw} height={vh-fy} fill="#E2DDD5" opacity="0.5"/>
            <line x1={0} y1={fy} x2={vw} y2={fy} stroke="#8C8680" strokeWidth="1.8"/>
            <line x1={0} y1={fy+2} x2={vw} y2={fy+2} stroke="#C4BEB6" strokeWidth="0.5"/>
          </g>;
        }
        if(z.r==='sun'){
          const r=Math.min(w,h)/2, cx=x+w/2, cy=y+h/2;
          return z.filled
            ? <circle key={i} cx={cx} cy={cy} r={r} fill="#2A2520"/>
            : <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="#2A2520" strokeWidth="0.8"/>;
        }
        if(z.r==='timeline'){
          const cx=x+w/2, ticks=z.ticks||4;
          return <g key={i}>
            <line x1={cx} y1={y} x2={cx} y2={y+h} stroke="#A09890" strokeWidth="0.8"/>
            {Array.from({length:ticks},(_,ti)=>{
              const ty=y+h*(ti+0.5)/ticks;
              return <line key={ti} x1={cx} y1={ty} x2={cx+vw*0.11} y2={ty} stroke="#C4BEB6" strokeWidth="0.5"/>;
            })}
          </g>;
        }
        return null;
      })}
      <rect x="0.4" y="0.4" width={vw-0.8} height={vh-0.8} fill="none" stroke="#CCCAB4" strokeWidth="0.7"/>
    </svg>
  );
}

// ── FORMAT SHAPE ─────────────────────────────────────────────────
function FormatShape({ fmt, size=56 }) {
  const aspect = fmt.w/fmt.h;
  const sw = aspect>=1 ? size : Math.round(size*aspect);
  const sh = aspect>=1 ? Math.round(size/aspect) : size;
  return (
    <svg width={sw} height={sh} viewBox={`0 0 ${sw} ${sh}`} style={{display:'block'}}>
      <defs>
        <pattern id={`fp-${fmt.id}-${size}`} x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="4" stroke="#C4BEB6" strokeWidth="0.5"/>
        </pattern>
      </defs>
      <rect width={sw} height={sh} fill={`url(#fp-${fmt.id}-${size})`}/>
      <rect x="0.5" y="0.5" width={sw-1} height={sh-1} fill="none" stroke="#A09890" strokeWidth="1"/>
    </svg>
  );
}

// ── HOME SCREEN ──────────────────────────────────────────────────
function HomeScreen({ format, layouts, favorites, onToggleFave, onSelect, activeTypes, setActiveTypes, activeModes, setActiveModes, cardConfig, numCols, isDesktop }) {
  const ALL_TYPES = ['single','spread','accordion','pocket'];
  const ALL_MODES = ['Drawing only','Drawing + notes','Full journal'];

  const filtered = layouts.filter(l => activeTypes.has(l.type) && activeModes.has(l.mode));

  const toggleType = t => {
    if (activeTypes.has(t) && activeTypes.size === 1) return;
    setActiveTypes(prev => { const n=new Set(prev); n.has(t)?n.delete(t):n.add(t); return n; });
  };
  const toggleMode = m => {
    if (activeModes.has(m) && activeModes.size === 1) return;
    setActiveModes(prev => { const n=new Set(prev); n.has(m)?n.delete(m):n.add(m); return n; });
  };

  const typesAllActive = ALL_TYPES.every(t => activeTypes.has(t));
  const modesAllActive = ALL_MODES.every(m => activeModes.has(m));

  const TYPE_TAGS = [
    { key:'single',    label:'Single',    icon:<IconSingle/> },
    { key:'spread',    label:'Spread',    icon:<IconSpread/> },
    { key:'accordion', label:'Accordion', icon:<IconAccordion/> },
    { key:'pocket',    label:'Pocket',    icon:<IconPocket/> },
  ];
  const MODE_TAGS = [
    { key:'Drawing only',    label:'Drawing', icon:<IconDrawing/> },
    { key:'Drawing + notes', label:'Mixed',   icon:<IconMixed/> },
    { key:'Full journal',    label:'Journal', icon:<IconJournal/> },
  ];

  const tagBtn = (key, label, icon, active, onToggle) => (
    <button key={key} onClick={onToggle} style={{
      display:'flex', alignItems:'center', gap:5,
      padding:'6px 12px', borderRadius:20,
      border:`1px solid ${active?'#2A2520':'#DDD8D2'}`,
      background: active ? '#F0EDE8' : 'transparent',
      color: '#2A2520',
      opacity: active ? 1 : 0.38,
      fontSize:13, letterSpacing:'0.02em', whiteSpace:'nowrap',
      cursor:'pointer', transition:'opacity 0.15s, border-color 0.15s, background 0.15s',
      flexShrink:0,
    }}>
      {icon}
      <span>{label}</span>
    </button>
  );

  const resetBtn = onClick => (
    <button onClick={onClick} style={{
      background:'none', border:'none', color:'#A09890', fontSize:11.5,
      cursor:'pointer', whiteSpace:'nowrap', padding:'0 2px', flexShrink:0,
      letterSpacing:'0.06em', textDecoration:'underline', alignSelf:'center',
    }}>reset</button>
  );

  const headingSize = isDesktop ? 52.5 : 42;

  return (
    <div style={{paddingTop: isDesktop ? 40 : 20}}>
      <div style={{marginBottom: isDesktop ? 18 : 12}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:headingSize,fontWeight:500,color:'#2A2520',letterSpacing:'-0.01em',lineHeight:1}}>Sketchbook</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:headingSize,fontStyle:'italic',color:'#8C8680',lineHeight:1.1}}>Layouts</div>
        <div style={{marginTop:6,fontSize:15,color:'#A09890',letterSpacing:'0.05em',textTransform:'uppercase'}}>{filtered.length} layout{filtered.length!==1?'s':''}</div>
      </div>

      <div className="filter-row" style={{display:'flex',gap:7,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
        {TYPE_TAGS.map(({key,label,icon}) => tagBtn(key, label, icon, activeTypes.has(key), ()=>toggleType(key)))}
        {!typesAllActive && resetBtn(()=>setActiveTypes(new Set(ALL_TYPES)))}
      </div>

      <div className="filter-row" style={{display:'flex',gap:7,marginBottom: isDesktop ? 28 : 18,overflowX:'auto',paddingBottom:2}}>
        {MODE_TAGS.map(({key,label,icon}) => tagBtn(key, label, icon, activeModes.has(key), ()=>toggleMode(key)))}
        {!modesAllActive && resetBtn(()=>setActiveModes(new Set(ALL_MODES)))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:`repeat(${numCols}, 1fr)`,gap:12}}>
        {filtered.map(layout=>(
          <LayoutCard key={layout.id} layout={layout} format={format}
            isFaved={favorites.includes(layout.id)}
            onFave={()=>onToggleFave(layout.id)}

        ))}
      </div>

      {filtered.length === 0 && (
        <div style={{paddingTop:80,textAlign:'center'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontStyle:'italic',color:'#B4AEA8',lineHeight:1.6}}>No layouts match this combination.<br/>Try adjusting the filters.</div>
        </div>
      )}

  );
}

      </button>
      <div style={{marginBottom:4}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isDesktop?57.5:45,fontWeight:500,color:'#2A2520',letterSpacing:'-0.01em',lineHeight:1}}>{layout.name}</div>
      </div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isDesktop?30:22.5,fontStyle:'italic',color:'#8C8680',marginBottom:isDesktop?36:24}}>{layout.subtitle}</div>
      {isDesktop ? (
        <div style={{display:'flex',gap:48,alignItems:'flex-start'}}>
          <div style={{width:'42%',flexShrink:0,position:'sticky',top:80}}>{diagram}</div>
          <div style={{flex:1}}>{details}</div>
        </div>
      ) : details}
    </div>
  );
}

// ── FAVORITES SCREEN ─────────────────────────────────────────────
function FavoritesScreen({ format, layouts, favorites, onSelect, onToggleFave, cardConfig, numCols }) {
  const faved = layouts.filter(l=>favorites.includes(l.id));
  return (
    <div style={{paddingTop:40}}>
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:52.5,fontWeight:500,color:'#2A2520',lineHeight:1}}>Saved</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:52.5,fontStyle:'italic',color:'#8C8680',lineHeight:1.1}}>Layouts</div>
        <div style={{marginTop:8,fontSize:15,color:'#A09890',letterSpacing:'0.05em',textTransform:'uppercase'}}>{faved.length} saved</div>
      </div>
      {faved.length===0 ? (
        <div style={{paddingTop:80,textAlign:'center'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontStyle:'italic',color:'#B4AEA8',lineHeight:1.6}}>Click the heart on any layout<br/>to save it here</div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:`repeat(${numCols}, 1fr)`,gap:12}}>
          {faved.map(layout=>(
            <LayoutCard key={layout.id} layout={layout} format={format} isFaved={true}
              onFave={()=>onToggleFave(layout.id)} onSelect={()=>onSelect(layout)}
              cardConfig={cardConfig}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────
function App() {
  const windowWidth  = useWindowWidth();
  const isDesktop    = windowWidth >= 768;
  const numCols      = windowWidth < 640 ? 2 : 4;
  const cardConfig   = getCardConfig(numCols);

  const savedFmtId = localStorage.getItem('sc_fmt');
  const initFmt = FORMATS.find(f=>f.id===savedFmtId)||null;
  const [format,setFormat]         = useState(initFmt);
  const [pickingFormat,setPicking] = useState(!initFmt);
  const [navTab,setNavTab]         = useState('browse');
  const [selected,setSelected]     = useState(null);
  const [activeTypes,setActiveTypes] = useState(()=>new Set(['single','spread','accordion','pocket']));
  const [activeModes,setActiveModes] = useState(()=>new Set(['Drawing only','Drawing + notes','Full journal']));
  const [favorites,setFavorites]   = useState(()=>{ try{return JSON.parse(localStorage.getItem('sc_faves')||'[]');}catch{return [];} });

  const selectFmt  = fmt=>{ setFormat(fmt); localStorage.setItem('sc_fmt',fmt.id); setPicking(false); };
  const toggleFave = id=>{ const n=favorites.includes(id)?favorites.filter(f=>f!==id):[...favorites,id]; setFavorites(n); localStorage.setItem('sc_faves',JSON.stringify(n)); };

  const showTabs   = !pickingFormat && !selected;
  const showFormat = !pickingFormat && !selected && !!format;

  return (
    <>
      <TopNav navTab={navTab} setNavTab={setNavTab} showTabs={showTabs} showFormat={showFormat} format={format} onChangeFormat={()=>setPicking(true)}/>
      <div className="page">
        {pickingFormat ? (
          <FormatPicker onSelect={selectFmt} current={format?.id} onBack={format?()=>setPicking(false):null}/>
        ) : selected ? (
          <DetailScreen layout={selected} format={format} isFaved={favorites.includes(selected.id)} onToggleFave={()=>toggleFave(selected.id)} onBack={()=>setSelected(null)} isDesktop={isDesktop}/>
        ) : navTab==='browse' ? (
          <HomeScreen format={format} layouts={LAYOUTS} favorites={favorites} onToggleFave={toggleFave} onSelect={setSelected} activeTypes={activeTypes} setActiveTypes={setActiveTypes} activeModes={activeModes} setActiveModes={setActiveModes} cardConfig={cardConfig} numCols={numCols} isDesktop={isDesktop}/>
        ) : (
          <FavoritesScreen format={format} layouts={LAYOUTS} favorites={favorites} onSelect={setSelected} onToggleFave={toggleFave} cardConfig={cardConfig} numCols={numCols}/>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
